<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echoes of Midnight | Fixed</title>
    
    <!-- المكتبات الأساسية - اتأكد إنك متصل بالإنترنت -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- تم تعديل استدعاء Framer Motion و Lucide لضمان التوافق -->
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505; /* اللون الأسود اللي بيظهر لك */
            color: white;
            margin: 0;
        }
        .grain-texture {
            position: fixed;
            inset: 0;
            background-image: url('https://www.transparenttextures.com/patterns/black-linen.png');
            opacity: 0.1;
            pointer-events: none;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // تعريف المكتبات من الـ Window عشان نضمن إنها اتقرت صح
        const { useState, useEffect, useMemo, useRef } = React;
        const motion = window.framerMotion.motion;
        const AnimatePresence = window.framerMotion.AnimatePresence;

        // مصفوفة الشخصيات
        const CHARACTERS = [
            { id: "salim", name: "سليم", role: "المخطط", quote: "الثقة هي أول ما يسرقه الليل.", color: "from-zinc-900 to-zinc-700" },
            { id: "nourhan", name: "نورهان", role: "الجرح الخفي", quote: "بعض الندوب لا تتحدث إلا بعد منتصف الليل.", color: "from-stone-900 to-stone-700" }
        ];

        // مكون الأيقونات المصلح
        const Icon = ({ name, className }) => {
            // محاكاة بسيطة للأيقونات عشان لو المكتبة اتأخرت في التحميل الموقع ميكرشش
            return <i className={`${className} inline-block`} style={{fontStyle: 'normal'}}>•</i>;
        };

        function App() {
            const [page, setPage] = useState("home");
            const [isScanning, setIsScanning] = useState(false);

            return (
                <div className="relative z-10 min-h-screen">
                    <header className="border-b border-white/5 bg-black/80 backdrop-blur-md p-4 sticky top-0">
                        <div className="max-w-7xl mx-auto flex justify-between items-center">
                            <h1 className="text-sm font-bold tracking-widest">ECHOES OF MIDNIGHT</h1>
                            <nav className="flex gap-4">
                                <button onClick={() => setPage("home")} className={`text-xs ${page==='home'?'text-white':'text-zinc-500'}`}>الرئيسية</button>
                                <button onClick={() => setPage("vision")} className={`text-xs ${page==='vision'?'text-white':'text-zinc-500'}`}>الرؤية</button>
                                <button onClick={() => setPage("sound")} className={`text-xs ${page==='sound'?'text-white':'text-zinc-500'}`}>الصوت</button>
                            </nav>
                        </div>
                    </header>

                    <main className="max-w-5xl mx-auto p-6">
                        {page === "home" && (
                            <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} className="py-20 text-center">
                                <h2 className="text-5xl font-bold mb-4">أصداء منتصف الليل</h2>
                                <p className="text-zinc-500 mb-12">مرحباً بك في نظام إدارة الإنتاج</p>
                                <div className="grid md:grid-cols-2 gap-6">
                                    {CHARACTERS.map(c => (
                                        <div key={c.id} className="p-8 rounded-3xl bg-zinc-900/50 border border-white/5 text-right">
                                            <span className="text-[10px] text-zinc-500 uppercase">{c.role}</span>
                                            <h3 className="text-2xl font-bold mt-2">{c.name}</h3>
                                            <p className="text-zinc-400 mt-4 italic">"{c.quote}"</p>
                                        </div>
                                    ))}
                                </div>
                            </motion.div>
                        )}

                        {page === "vision" && (
                            <div className="py-10">
                                <h2 className="text-2xl font-bold mb-6">محلل الرؤية</h2>
                                <div className="aspect-video bg-zinc-900 rounded-3xl border border-dashed border-white/10 flex items-center justify-center relative overflow-hidden">
                                    {isScanning && (
                                        <motion.div 
                                            animate={{ top: ["0%", "100%", "0%"] }} 
                                            transition={{ duration: 3, repeat: Infinity }}
                                            className="absolute w-full h-1 bg-emerald-500 shadow-[0_0_15px_emerald-500]" 
                                        />
                                    )}
                                    <button onClick={() => setIsScanning(!isScanning)} className="px-6 py-2 bg-white text-black rounded-full text-xs font-bold">
                                        {isScanning ? "إيقاف المسح" : "بدأ الفحص البصري"}
                                    </button>
                                </div>
                            </div>
                        )}

                        {page === "sound" && (
                            <div className="py-10">
                                <h2 className="text-2xl font-bold mb-6">طبقات الصوت</h2>
                                <div className="space-y-4">
                                    {[1, 2, 3].map(i => (
                                        <div key={i} className="p-4 bg-white/5 rounded-xl flex justify-between items-center">
                                            <span className="text-sm">مؤشر الصوت المحيطي {i}</span>
                                            <div className="w-32 h-1 bg-white/10 rounded-full overflow-hidden">
                                                <div className="h-full bg-white w-1/2"></div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
